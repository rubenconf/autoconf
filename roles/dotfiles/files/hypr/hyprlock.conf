# BACKGROUND
background {
    monitor =
    # path = ~/.config/hypr/walls/1.png
    path = /home/ruben/Pictures/wallpapers/login_back.JPG
     blur_passes = 0
    # contrast = 1
    # brightness = 1
    # vibrancy = 0.2
    # vibrancy_darkness = 0.2
}

# GENERAL
general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
    ignore_empty_input = true
}

# INPUT FIELD
input-field {
    monitor =
    size = 280, 50              # Tamaño estándar, un pelín más ancho
    outline_thickness = 0       # Sin borde (esto es seguro)
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    
    # IMPORTANTE: No usamos transparencia 0 total. 
    # Usamos un 0.05 de opacidad para que el sistema "detecte" el objeto.
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.05) 
    
    # Puntos negros para tu fondo claro
    font_color = rgb(0, 0, 0)
    
    fade_on_empty = false
    rounding = -1
    
    # Placeholder vacío pero con espacio para evitar errores de renderizado
    placeholder_text = " "
    
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
    
    check_color = rgb(137, 180, 250)
    fail_color = rgb(243, 139, 168)
}


# DATE
label {
  monitor =
  text = cmd[update:1000] date +"%A, %B %d"
  color = rgb(17, 17, 27) # Texto casi negro para máximo contraste
  font_size = 22
  font_family = JetBrains Mono
  position = 0, 300
  halign = center
  valign = center
}
# TIME
label {
  monitor = 
  text = cmd[update:1000] date +"%H:%M"
  color = rgb(30, 30, 46) # Azul muy oscuro
  font_size = 95
  font_family = JetBrains Mono Extrabold
  position = 0, 180
  halign = center
  valign = center
}
